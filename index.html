<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sing-Box Profile Generator (Lead Ed.)</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-mut: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font);
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: #60a5fa; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
        @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 0.875rem; font-weight: 600; color: var(--text-mut); }
        input, select {
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.625rem 0.75rem;
            border-radius: 6px;
            font-size: 0.925rem;
            transition: border-color 0.15s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        .custom-dns-input { display: none; margin-top: 0.5rem; }
        .actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        button:hover { background: var(--accent-hover); }
        button.secondary { background: #475569; }
        button.secondary:hover { background: #334155; }
        #status { margin-top: 1rem; font-size: 0.875rem; font-weight: 600; }
        .status-error { color: var(--error); }
        .status-success { color: var(--success); }
        .output-section { margin-top: 2rem; }
        pre {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            max-height: 450px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            color: #34d399;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Архитектурный генератор профилей Sing-Box</h1>
    
    <div class="grid">
        <div class="form-group full">
            <label for="remoteUrl">Remote Rule-Set URL (.srs):</label>
            <input type="text" id="remoteUrl" value="https://github.com/Kira361323/Dns-rules/releases/latest/download/domains.srs">
        </div>

        <div class="form-group">
            <label for="updateInterval">Интервал обновления Rule-Set:</label>
            <select id="updateInterval">
                <option value="12h">12 часов</option>
                <option value="24h" selected>24 часа</option>
                <option value="48h">48 часов</option>
                <option value="72h">72 часа</option>
            </select>
        </div>

        <div class="form-group">
            <label for="logLevel">Уровень логирования (Log Level):</label>
            <select id="logLevel">
                <option value="info" selected>info (Стандартный)</option>
                <option value="debug">debug (Отладка сети)</option>
                <option value="warn">warn (Только предупреждения)</option>
                <option value="error">error (Только ошибки)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dnsStrategy">Стратегия резолвинга DNS:</label>
            <select id="dnsStrategy">
                <option value="prefer_ipv4" selected>prefer_ipv4 (Рекомендуется)</option>
                <option value="ipv4_only">ipv4_only (Строгая изоляция IPv6)</option>
                <option value="prefer_ipv6">prefer_ipv6</option>
            </select>
        </div>

        <div class="form-group">
            <label for="redirectSelect">Redirect DNS (для проксируемого трафика):</label>
            <select id="redirectSelect" onchange="toggleCustom('redirectSelect', 'redirectCustom')">
                <option value='{"type":"https","url":"dnsforge.de"}' selected>DNSForge DoH (No-Ads / Privacy)</option>
                <option value='{"type":"https","url":"dns.adguard-dns.com"}'>AdGuard DoH (AdBlock)</option>
                <option value='{"type":"https","url":"cloudflare-dns.com"}'>Cloudflare DoH (Fast)</option>
                <option value='{"type":"https","url":"dns.google"}'>Google DoH (Standard)</option>
                <option value='{"type":"tls","url":"dns.google"}'>Google DoT (TLS)</option>
                <option value="custom">-- Пользовательский DNS --</option>
            </select>
            <input type="text" id="redirectCustom" class="custom-dns-input" placeholder="например: https://dns.quad9.net/dns-query">
        </div>

        <div class="form-group">
            <label for="directSelect">Direct DNS (для локального/обходного трафика):</label>
            <select id="directSelect" onchange="toggleCustom('directSelect', 'directCustom')">
                <option value='{"type":"https","url":"dns.google"}' selected>Google DoH (Standard)</option>
                <option value='{"type":"https","url":"cloudflare-dns.com"}'>Cloudflare DoH (Fast)</option>
                <option value='{"type":"https","url":"dns.adguard-dns.com"}'>AdGuard DoH (AdBlock)</option>
                <option value='{"type":"tls","url":"1.1.1.1"}'>Cloudflare DoT (TLS)</option>
                <option value="custom">-- Пользовательский DNS --</option>
            </select>
            <input type="text" id="directCustom" class="custom-dns-input" placeholder="например: tls://1.1.1.1">
        </div>
    </div>

    <div class="actions">
        <button onclick="generateConfig()">Сгенерировать профиль</button>
        <button class="secondary" onclick="copyConfig()">Копировать в буфер</button>
        <button class="secondary" onclick="downloadConfig()">Скачать .json</button>
    </div>

    <div id="status"></div>

    <div class="output-section">
        <label>Результат генерации (Sing-Box JSON):</label>
        <pre><code id="jsonOutput">// Здесь появится сгенерированный конфигурационный файл...</code></pre>
    </div>
</div>

<script>
    function toggleCustom(selectId, inputId) {
        const val = document.getElementById(selectId).value;
        const inputEl = document.getElementById(inputId);
        inputEl.style.display = (val === 'custom') ? 'block' : 'none';
    }

    // Жесткая очистка URL от протоколов, путей и портов для Sing-Box
    function parseDnsInput(url, defaultType = 'https') {
        let cleanUrl = url.trim();
        let type = defaultType;

        if (cleanUrl.startsWith('https://')) type = 'https';
        else if (cleanUrl.startsWith('tls://')) type = 'tls';
        else if (cleanUrl.startsWith('udp://')) type = 'udp';
        else if (cleanUrl.startsWith('tcp://')) type = 'tcp';

        // Удаляем префикс протокола
        cleanUrl = cleanUrl.replace(/^(https?|tls|udp|tcp):\/\//i, '');
        
        // Удаляем путь (например, /dns-query)
        cleanUrl = cleanUrl.split('/')[0];
        
        // Удаляем порт, если он есть (кроме IPv6 адресов)
        let port = undefined;
        if (cleanUrl.includes(':') && !cleanUrl.includes('::')) {
            const parts = cleanUrl.split(':');
            cleanUrl = parts[0];
            port = parseInt(parts[1], 10);
        }

        const res = { type: type, server: cleanUrl };
        if (port) res.server_port = port;
        return res;
    }

    function getDnsSelection(selectId, inputId) {
        const selectVal = document.getElementById(selectId).value;
        if (selectVal === 'custom') {
            const customVal = document.getElementById(inputId).value.trim();
            if (!customVal) throw new Error(`Ошибка: Заполните поле пользовательского DNS для ${selectId}`);
            return parseDnsInput(customVal);
        }
        const parsed = JSON.parse(selectVal);
        return parseDnsInput(parsed.url, parsed.type);
    }

    function generateConfig() {
        const statusEl = document.getElementById('status');
        statusEl.className = '';
        statusEl.textContent = '';

        try {
            const remoteUrl = document.getElementById('remoteUrl').value.trim();
            if (!remoteUrl) throw new Error('Ошибка: Не указан URL для Remote Rule-Set.');

            const updateInterval = document.getElementById('updateInterval').value;
            const logLevel = document.getElementById('logLevel').value;
            const strategy = document.getElementById('dnsStrategy').value;

            const redirectDns = getDnsSelection('redirectSelect', 'redirectCustom');
            const directDns = getDnsSelection('directSelect', 'directCustom');

            const config = {
                log: {
                    disabled: false,
                    level: logLevel,
                    timestamp: true
                },
                dns: {
                    servers: [
                        {
                            tag: "bootstrap",
                            type: "udp",
                            server: "8.8.8.8"
                        },
                        {
                            tag: "redirect-dns",
                            type: redirectDns.type,
                            server: redirectDns.server,
                            domain_resolver: "bootstrap",
                            ...(redirectDns.server_port && { server_port: redirectDns.server_port })
                        },
                        {
                            tag: "direct-dns",
                            type: directDns.type,
                            server: directDns.server,
                            domain_resolver: "bootstrap",
                            ...(directDns.server_port && { server_port: directDns.server_port })
                        }
                    ],
                    rules: [
                        {
                            outbound: "any",
                            server: "direct-dns"
                        },
                        {
                            rule_set: "domains-ruleset",
                            server: "redirect-dns"
                        }
                    ],
                    strategy: strategy
                },
                inbounds: [
                    {
                        type: "tun",
                        tag: "tun-in",
                        interface_name: "tun0",
                        inet4_address: "172.19.0.1/30",
                        auto_route: true,
                        strict_route: true,
                        sniff: true,
                        sniff_override_destination: false
                    }
                ],
                outbounds: [
                    {
                        type: "direct",
                        tag: "direct"
                    },
                    {
                        type: "dns",
                        tag: "dns-out"
                    }
                ],
                route: {
                    rule_set: [
                        {
                            type: "remote",
                            tag: "domains-ruleset",
                            format: "binary",
                            url: remoteUrl,
                            download_detour: "direct",
                            update_interval: updateInterval
                        }
                    ],
                    rules: [
                        {
                            protocol: "dns",
                            action: "hijack-dns"
                        },
                        {
                            ip_is_private: true,
                            outbound: "direct"
                        },
                        {
                            rule_set: "domains-ruleset",
                            outbound: "direct"
                        }
                    ]
                }
            };

            const jsonString = JSON.stringify(config, null, 2);
            document.getElementById('jsonOutput').textContent = jsonString;
            statusEl.textContent = '✔ Профиль успешно сгенерирован!';
            statusEl.className = 'status-success';
            return jsonString;
        } catch (e) {
            statusEl.textContent = e.message;
            statusEl.className = 'status-error';
            return null;
        }
    }

    function copyConfig() {
        const json = generateConfig();
        if (!json) return;
        navigator.clipboard.writeText(json).then(() => {
            const statusEl = document.getElementById('status');
            statusEl.textContent = '✔ Конфигурация скопирована в буфер обмена!';
            statusEl.className = 'status-success';
        });
    }

    function downloadConfig() {
        const json = generateConfig();
        if (!json) return;
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'sing-box-profile.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Автогенерация при загрузке страницы
    window.onload = generateConfig;
</script>
</body>
</html>
